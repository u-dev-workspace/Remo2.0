services:
  app:
    build:
      context: .
    image: remo-api:latest
    container_name: remo-api
    networks:
      - remo-network
    restart: no
    env_file:
      - .env
    environment:
      # API слушает 8080 внутри, наружу — 3005
      PORT: 3006:8080
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3006}
      # Укажи внешний DSN или подключи отдельный сервис БД
      DATABASE_URL: ${DATABASE_URL}
      # по желанию: CORS для фронта
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://localhost:3005}
    ports:
      - "3005:8080"
    volumes:
      - /var/www/remo-uploads:/app/uploads
    # убедимся, что папка доступна пользователю node внутри контейнера
    command: >
      sh -c "mkdir -p /app/uploads &&
             chown -R node:node /app/uploads &&
             npx prisma generate &&
             npx prisma migrate deploy &&
             node dist/src/main.js"
volumes:
  uploads_data:


networks:
  remo-network:
    external: true