version: "3.9"

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: remo_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${PORT:-8080}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3005:8080"
    volumes:
      - uploads_data:/app/uploads   # персистентные файлы
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/docs >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    container_name: remo_adminer
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8080"    # Adminer -> http://localhost:8081
    environment:
      # подтяни по желанию
      ADMINER_DEFAULT_SERVER: db

volumes:
  mysql_data:
  uploads_data:
