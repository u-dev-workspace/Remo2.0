<h3>Socket test</h3>
<div id="log" style="font-family:monospace"></div>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
  const TOKEN = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJjbWdra3VlbWswMDAxZTlmMzB2aGh3ejNrIiwicm9sZSI6IkNPTlRSQUNUT1IiLCJpYXQiOjE3NjA3MjQ3MDIsImV4cCI6MTc2MDcyNTYwMn0.TmwAczpRU5eB5QIr4Kf-oxtW_PdAIpcvDP8gHowuAec';
  const CONVERSATION_ID = 'cmgv5vl5w0019i5byuwkwjtcl';

  const out = (m,...a)=>document.getElementById('log').innerText += m+' '+a.map(x=>JSON.stringify(x)).join(' ')+'\n';
