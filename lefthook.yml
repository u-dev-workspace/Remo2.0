pre-commit:
  parallel: false
  commands:
    semgrep:
      run: >
        docker run --rm
        -v "$(pwd):/src" -w /src
        semgrep/semgrep:latest
        semgrep scan
        --config .semgrep/rules/nestjs.yml
        --config .semgrep/rules/nextjs.yml
        --severity ERROR
        --error
        {staged_files}
      glob: "*.{ts,tsx,js,jsx}"
      fail_text: |
        ❌ Semgrep нашёл критическую уязвимость (ERROR-severity).
        Подробнее:
          docker run --rm -v "$(pwd):/src" -w /src semgrep/semgrep:latest semgrep scan --config .semgrep/rules/ src/
