services:
  node:
    image: ${IMAGE_TAG:-storage.centi.space/remo-api:latest}

    command: ["node", "dist/src/main.js"]

    env_file: .env

    environment:
      NODE_ENV: production
      PORT: "8080"

    ports:
      - target: 8080
        published: 3005
        mode: ingress

    deploy:
      replicas: 3

      update_config:
        parallelism: 1
        delay: 15s
        failure_action: rollback
        order: start-first
        monitor: 30s

      rollback_config:
        parallelism: 1
        delay: 5s
        order: stop-first

      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"

    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:8080/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

    networks:
      - remo-swarm

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

networks:
  remo-swarm:
    driver: overlay
    attachable: true
    external: true