server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Собираем логи из Docker контейнеров
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          # Только контейнеры из нашего стека (label = com.docker.stack.namespace)
          - name: label
            values: ["com.docker.stack.namespace=remo"]
    relabel_configs:
      # Имя сервиса
      - source_labels: ["__meta_docker_container_label_com_docker_swarm_service_name"]
        target_label: "service"
      # Имя контейнера
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"
      # ID узла Swarm
      - source_labels: ["__meta_docker_container_label_com_docker_swarm_node_id"]
        target_label: "node_id"
      # ID задачи Swarm
      - source_labels: ["__meta_docker_container_label_com_docker_swarm_task_id"]
        target_label: "task_id"
      # Стек
      - source_labels: ["__meta_docker_container_label_com_docker_stack_namespace"]
        target_label: "stack"

    pipeline_stages:
      # Пытаемся разпарсить JSON-логи (pino output)
      - json:
          expressions:
            level: level
            msg: msg
            err: err
            responseTime: responseTime
            req_method: "req.method"
            req_url: "req.url"
            statusCode: statusCode
      - labels:
          level:
          statusCode:
      # Timestamp из лога (если есть)
      - timestamp:
          source: time
          format: RFC3339Nano
          fallback_formats:
            - UnixMs
