global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Remo API — все реплики через Swarm DNS
  # tasks.remo_app резолвит IP всех running-реплик сервиса
  - job_name: "remo-api"
    dns_sd_configs:
      - names: ["tasks.remo_app"]
        type: A
        port: 8080
    metrics_path: /metrics

  # Node Exporter — метрики хоста (CPU, RAM, disk, network)
  # global mode = по одному на каждом узле кластера
  - job_name: "node-exporter"
    dns_sd_configs:
      - names: ["tasks.monitoring_node-exporter"]
        type: A
        port: 9100

  # cAdvisor — метрики контейнеров (CPU, memory, network per container)
  - job_name: "cadvisor"
    dns_sd_configs:
      - names: ["tasks.monitoring_cadvisor"]
        type: A
        port: 8080
